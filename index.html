<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>얍님의 사이트</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: #f7f7f8;
            color: #222;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            padding: 40px 24px;
        }
        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }
        h1 {
            margin-top: 0;
            font-size: 32px;
            font-weight: 700;
        }
        p {
            line-height: 1.7;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>안녕하세요 👋</h1>
            <p>
                얍님의 깔끔한 모던 페이지예요.<br>
                원하는 내용으로 마음껏 바꿔 넣으시면 돼요!
            </p>
        </div>
    </div>
</body>
</html>
